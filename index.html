<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>极简跳转器</title>
    <script>
        // 已配置好您的仓库
        const GITHUB_USERNAME = 'GJW2559';
        const REPO_NAME = 'go-mscode';
        const FILE_PATH = '.link';
        const BRANCH = 'main';  // 如果是 master 请改成 'master'
        
        const RAW_URL = `https://raw.githubusercontent.com/${GITHUB_USERNAME}/${REPO_NAME}/${BRANCH}/${FILE_PATH}`;
        
        async function go() {
            try {
                console.log('正在读取:', RAW_URL);
                const res = await fetch(RAW_URL);
                if (!res.ok) throw new Error(`HTTP ${res.status} - 文件不存在或仓库不可访问`);
                const url = (await res.text()).trim();
                if (!url) throw new Error('.link 文件内容为空');
                if (!url.startsWith('http')) throw new Error('链接必须以 http:// 或 https:// 开头');
                console.log('跳转到:', url);
                window.location.href = url;
            } catch (err) {
                document.body.innerHTML = `
                    <div style="padding:2rem;font-family:monospace;max-width:600px;margin:0 auto;">
                        <h3>❌ 跳转失败</h3>
                        <p>错误: ${err.message}</p>
                        <hr>
                        <p><strong>解决方法：</strong></p>
                        <ol>
                            <li>检查仓库是否为公开仓库</li>
                            <li>确认 .link 文件存在</li>
                            <li>确认 .link 文件内有完整网址（如 https://www.baidu.com）</li>
                        </ol>
                        <p>当前读取地址: <code>${RAW_URL}</code></p>
                        <button onclick="location.reload()">重新尝试</button>
                    </div>
                `;
            }
        }
        
        // 页面加载后立即跳转
        window.addEventListener('DOMContentLoaded', go);
    </script>
</head>
<body style="margin:0;padding:2rem;font-family:system-ui;text-align:center;background:#0a0a0a;color:#fff;">
    <div>⏳ 正在获取跳转链接，请稍候...</div>
</body>
</html>
